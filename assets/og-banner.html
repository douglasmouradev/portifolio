<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OG Banner — Douglas Moura</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0908;
      padding: 2rem;
    }
    .banner {
      width: 1200px;
      height: 630px;
      background: #11100e;
      color: #f3ece2;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 88px;
      border: 1px solid rgba(243, 236, 226, 0.08);
    }
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 100% 0%, rgba(212, 160, 84, 0.14), transparent 55%),
        radial-gradient(ellipse 50% 60% at 0% 100%, rgba(212, 160, 84, 0.06), transparent 50%);
      pointer-events: none;
    }
    .banner::after {
      content: '';
      position: absolute;
      top: 0; left: 88px; right: 88px;
      height: 3px;
      background: linear-gradient(90deg, #d4a054, transparent);
    }
    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #d4a054;
      margin-bottom: 20px;
      position: relative;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 72px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      position: relative;
    }
    h1 span { color: #d4a054; }
    .tagline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 36px;
      font-weight: 500;
      color: #f3ece2;
      margin-bottom: 28px;
      position: relative;
    }
    .services {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      color: #b8b0a4;
      position: relative;
    }
    .url {
      position: absolute;
      bottom: 56px;
      right: 88px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      color: #7a746a;
      letter-spacing: 0.04em;
    }
    .hint {
      position: fixed;
      bottom: 1rem;
      font-size: 13px;
      color: #7a746a;
    }
  </style>
</head>
<body>
  <article class="banner">
    <p class="eyebrow">Dev Full Stack · Remoto</p>
    <h1>Douglas <span>Moura</span></h1>
    <p class="tagline">Do briefing à publicação</p>
    <p class="services">Criação de sites · Sistemas web · Help Desk · CRM · SaaS</p>
    <p class="url">portifolio-douglas-moura.vercel.app</p>
  </article>
  <p class="hint">1200×630 px · Open Graph · Capture ou Ctrl+P</p>
</body>
</html>
